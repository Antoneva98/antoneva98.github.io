name: Deploy portfolios to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: v3/package-lock.json

      # Build the v3 Vite app.
      - run: npm ci
        working-directory: v3
      - run: npm run build
        working-directory: v3

      # Assemble the publish directory so all three portfolios coexist:
      #   /my_portfolio/      -> portfolio #1 (root index.html)
      #   /my_portfolio/v2/   -> portfolio #2
      #   /my_portfolio/v3/   -> portfolio #3 (built Vite app)
      - name: Assemble site
        run: |
          mkdir -p _site
          # Copy repo root (old portfolio + v2), excluding build/tooling dirs.
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'v3' \
            --exclude '_site' \
            ./ _site/
          # Place the built v3 app under /v3/.
          mkdir -p _site/v3
          cp -r v3/dist/. _site/v3/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
