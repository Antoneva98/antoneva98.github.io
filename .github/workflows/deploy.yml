name: Deploy portfolios to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: v3/package-lock.json

      # Build the v3 Vite app.
      - run: npm ci
        working-directory: v3
      - run: npm run build
        working-directory: v3

      # Assemble the publish directory. v3 is the live portfolio at the root;
      # the earlier versions stay reachable as an archive:
      #   /      -> portfolio #3 (built Vite app, current)
      #   /v1/   -> portfolio #1 (old root index.html, archived)
      #   /v2/   -> portfolio #2 (archived)
      - name: Assemble site
        run: |
          mkdir -p _site
          # Current portfolio (v3) at the root.
          cp -r v3/dist/. _site/
          # Archive the old root portfolio under /v1/.
          mkdir -p _site/v1
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gitignore' \
            --exclude 'v2' \
            --exclude 'v3' \
            --exclude '_site' \
            ./ _site/v1/
          # Archive v2 under /v2/.
          mkdir -p _site/v2
          cp -r v2/. _site/v2/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
